# =============================================================================
# DevOpsGPT — Production Deployment Pipeline
# =============================================================================
# Triggers: manual dispatch, tag push (v*)
# Flow:    CI gate → Deploy staging → Smoke test → Deploy production
# =============================================================================

name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - staging
          - production
        default: staging
      skip_staging:
        description: "Skip staging and deploy directly to production"
        required: false
        type: boolean
        default: false
  push:
    tags:
      - "v*"

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false  # Never cancel a deployment in progress

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/devopsgpt

permissions:
  contents: read
  packages: read

jobs:
  # ===========================================================================
  # Gate: Ensure CI has passed
  # ===========================================================================
  ci-gate:
    name: "🚦 CI Gate Check"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify CI status
        uses: actions/github-script@v7
        with:
          script: |
            const { data: checks } = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
            });

            const ciRun = checks.check_runs.find(
              run => run.name.includes('CI Summary') || run.name.includes('ci-summary')
            );

            if (!ciRun) {
              core.warning('CI Summary check not found — proceeding with caution');
              return;
            }

            if (ciRun.conclusion !== 'success') {
              core.setFailed(`CI pipeline did not pass (status: ${ciRun.conclusion}). Fix CI before deploying.`);
            } else {
              core.info('✅ CI gate passed');
            }

  # ===========================================================================
  # Deploy to Staging
  # ===========================================================================
  deploy-staging:
    name: "🟡 Deploy → Staging"
    runs-on: ubuntu-latest
    needs: ci-gate
    if: |
      (github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && !inputs.skip_staging)
    environment:
      name: staging
      url: ${{ vars.STAGING_URL || 'https://staging.devopsgpt.example.com' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve image tag
        id: tag
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=sha-$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to staging
        env:
          DEPLOY_TAG: ${{ steps.tag.outputs.tag }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "=============================================="
          echo "🚀 Deploying to STAGING environment"
          echo "   Image tag: ${DEPLOY_TAG}"
          echo "   Backend:   ${REGISTRY}/${IMAGE_PREFIX}-backend:${DEPLOY_TAG}"
          echo "   Frontend:  ${REGISTRY}/${IMAGE_PREFIX}-frontend:${DEPLOY_TAG}"
          echo "=============================================="

          # ─────────────────────────────────────────────────
          # REPLACE THIS BLOCK with your actual deployment
          # commands. Examples:
          #
          # Docker Compose (self-hosted):
          #   ssh deploy@staging-server "
          #     cd /opt/devopsgpt &&
          #     export IMAGE_TAG=${DEPLOY_TAG} &&
          #     docker compose pull &&
          #     docker compose up -d --remove-orphans
          #   "
          #
          # Kubernetes:
          #   kubectl set image deployment/backend \
          #     backend=${REGISTRY}/${IMAGE_PREFIX}-backend:${DEPLOY_TAG} \
          #     --namespace=staging
          #   kubectl set image deployment/frontend \
          #     frontend=${REGISTRY}/${IMAGE_PREFIX}-frontend:${DEPLOY_TAG} \
          #     --namespace=staging
          #   kubectl rollout status deployment/backend --namespace=staging --timeout=120s
          #   kubectl rollout status deployment/frontend --namespace=staging --timeout=120s
          #
          # AWS ECS:
          #   aws ecs update-service --cluster staging \
          #     --service devopsgpt-backend --force-new-deployment
          #   aws ecs update-service --cluster staging \
          #     --service devopsgpt-frontend --force-new-deployment
          # ─────────────────────────────────────────────────

          echo "✅ Staging deployment completed"

  # ===========================================================================
  # Staging Smoke Tests
  # ===========================================================================
  smoke-test-staging:
    name: "🔥 Smoke Test Staging"
    runs-on: ubuntu-latest
    needs: deploy-staging
    steps:
      - name: Wait for service stabilization
        run: sleep 15

      - name: Health check — Backend API
        run: |
          STAGING_URL="${{ vars.STAGING_API_URL || 'https://staging-api.devopsgpt.example.com' }}"
          echo "Checking backend health at: ${STAGING_URL}/docs"

          # Retry up to 5 times with 10s intervals
          for i in {1..5}; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "${STAGING_URL}/docs" || echo "000")
            if [[ "$HTTP_CODE" == "200" ]]; then
              echo "✅ Backend is healthy (HTTP ${HTTP_CODE})"
              exit 0
            fi
            echo "⏳ Attempt ${i}/5 — HTTP ${HTTP_CODE}, retrying in 10s..."
            sleep 10
          done

          echo "⚠️ Backend health check could not reach staging — this may be expected if staging is not yet configured"
          echo "Continuing pipeline..."

      - name: Health check — Frontend
        run: |
          STAGING_URL="${{ vars.STAGING_URL || 'https://staging.devopsgpt.example.com' }}"
          echo "Checking frontend at: ${STAGING_URL}"

          for i in {1..5}; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "${STAGING_URL}" || echo "000")
            if [[ "$HTTP_CODE" == "200" ]]; then
              echo "✅ Frontend is healthy (HTTP ${HTTP_CODE})"
              exit 0
            fi
            echo "⏳ Attempt ${i}/5 — HTTP ${HTTP_CODE}, retrying in 10s..."
            sleep 10
          done

          echo "⚠️ Frontend health check could not reach staging — this may be expected if staging is not yet configured"
          echo "Continuing pipeline..."

  # ===========================================================================
  # Deploy to Production
  # ===========================================================================
  deploy-production:
    name: "🟢 Deploy → Production"
    runs-on: ubuntu-latest
    needs: [ci-gate, smoke-test-staging]
    if: |
      always() &&
      needs.ci-gate.result == 'success' &&
      (
        (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
        (github.event_name == 'workflow_dispatch' && inputs.environment == 'production')
      )
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL || 'https://devopsgpt.example.com' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve image tag
        id: tag
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=sha-$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to production
        env:
          DEPLOY_TAG: ${{ steps.tag.outputs.tag }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "=============================================="
          echo "🚀 Deploying to PRODUCTION environment"
          echo "   Image tag: ${DEPLOY_TAG}"
          echo "   Backend:   ${REGISTRY}/${IMAGE_PREFIX}-backend:${DEPLOY_TAG}"
          echo "   Frontend:  ${REGISTRY}/${IMAGE_PREFIX}-frontend:${DEPLOY_TAG}"
          echo "=============================================="

          # ─────────────────────────────────────────────────
          # REPLACE THIS BLOCK with your production deploy.
          # Same patterns as staging — see above comments.
          # ─────────────────────────────────────────────────

          echo "✅ Production deployment completed"

      - name: Create deployment summary
        run: |
          echo "## 🚀 Production Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Tag** | ${{ steps.tag.outputs.tag }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Actor** | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Time** | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |" >> $GITHUB_STEP_SUMMARY
